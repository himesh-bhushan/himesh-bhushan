name: Tic-Tac-Toe Engine

on:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    # Only run if the issue title starts with 'ttt|'
    if: startsWith(github.event.issue.title, 'ttt|')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Game Engine
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json README.md
          git commit -m "Update Tic-Tac-Toe board" || exit 0
          git push

      - name: Close the Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Move processed successfully! The README has been updated."
